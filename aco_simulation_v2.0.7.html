<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACO — Colonia de Hormigas v0.2.7</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap');

  :root {
    --paper: #f5f0e8;
    --ink: #1a1410;
    --ink-light: #4a3f35;
    --ink-faint: #c8bfb0;
    --amber: #d4780a;
    --amber-glow: rgba(212,120,10,0.18);
    --food-green: #2d6a2d;
    --food-glow: rgba(45,106,45,0.25);
    --nest-red: #8b2020;
    --nest-glow: rgba(139,32,32,0.2);
    /* Colony colors */
    --colony-0: #c0180c;        /* rojo */
    --colony-0-glow: rgba(192,24,12,0.22);
    --colony-0-phero: 192,24,12;
    --colony-1: #1a1410;        /* negro (ink) */
    --colony-1-glow: rgba(26,20,16,0.22);
    --colony-1-phero: 26,20,16;
    --pheromone-color: rgba(212,120,10,VAR_ALPHA);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* subtle grid paper texture */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(180,160,130,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,160,130,0.12) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events:none;
    z-index:0;
  }

  header {
    position:relative;
    z-index:10;
    padding: 10px 20px 6px;
    border-bottom: 1px solid var(--ink-faint);
    display:flex;
    align-items:baseline;
    gap:16px;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(4px);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  header h1 em {
    font-style: italic;
    color: var(--amber);
  }

  .subtitle {
    font-size: 0.62rem;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .spacer { flex:1; }

  .stats {
    display:flex;
    gap:20px;
    font-size: 0.62rem;
    color: var(--ink-light);
  }

  .stats span { display:flex; gap:5px; align-items:center; }
  .stats b { color: var(--ink); font-weight:500; }

  /* main canvas area */
  #arena {
    position: relative;
    flex:1;
    overflow:hidden;
    z-index:1;
  }

  #pheromone-canvas {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  #trail-canvas {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0.7;
  }

  #ant-layer {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
  }

  /* prey insect sources */
  .food-source {
    position:absolute;
    /* width/height=0: el punto left/top ES el centro exacto de colisión.
       Cada hijo se posiciona absolutamente respecto a ese punto. */
    width:0; height:0;
    cursor:default;
  }

  .insect-sprite {
    position:absolute;
    transition: opacity 0.4s ease;
    filter: drop-shadow(0 0 3px rgba(45,106,45,0.5));
    animation: insect-idle 3s ease-in-out infinite;
    transform-origin: center center;
  }

  .food-source.depleted .insect-sprite {
    filter: none;
    animation: none;
  }

  /* barra de stock */
  .food-bar-wrap {
    position:absolute;
    left:50%; transform:translateX(-50%);
    /* top se setea inline según altura del sprite */
    height: 3px;
    background: rgba(0,0,0,0.10);
    border-radius: 2px;
    overflow: hidden;
  }

  .food-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  /* tooltip con el número exacto */
  .food-source {
    position: relative; /* needed for tooltip */
  }

  .food-tooltip {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    /* top se setea inline para quedar encima del sprite */
    background: rgba(26,20,16,0.82);
    color: #f5f0e8;
    font-size: 0.58rem;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    letter-spacing: 0.04em;
    z-index: 10;
  }

  .food-source:hover .food-tooltip { opacity: 1; }

  .food-source.depleted .food-bar { background: var(--ink-faint) !important; }

  @keyframes insect-idle {
    0%,100% { transform: rotate(-2deg) scale(1) translate(0px, 0px); }
    25%      { transform: rotate(1deg)  scale(1.02) translate(1px, -1px); }
    75%      { transform: rotate(-1deg) scale(0.99) translate(-1px, 1px); }
  }

  /* ── ABSTRACT THEME (v0.0.5 style) ── */
  .theme-abstract .insect-sprite,
  .theme-abstract .food-bar-wrap,
  .theme-abstract .food-tooltip { display: none !important; }

  /* .theme-abstract .food-source no necesita flex:
     food-ring y food-label son position:absolute centrados en 0,0 */

  .theme-abstract .food-ring {
    position:absolute;
    width:36px; height:36px;
    /* left/top vienen del inline style (cx_px, cy_px) */
    transform:translate(-50%,-50%);
    border-radius:50%;
    border: 1.5px solid var(--food-green);
    background: var(--food-glow);
    display:flex; align-items:center; justify-content:center;
    font-size:0.75rem;
    color: var(--food-green);
    font-weight:500;
    animation: pulse-food 2.5s ease-in-out infinite;
  }

  .theme-abstract .food-label {
    position:absolute;
    /* left/top vienen del inline style (cx_px, cy_px+22) */
    transform:translateX(-50%);
    font-size:0.55rem;
    color: var(--food-green);
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .theme-abstract .food-source.depleted .food-ring {
    opacity: 0.3;
    animation: none;
  }

  @keyframes pulse-food {
    0%,100% { box-shadow: 0 0 0 0 var(--food-glow), 0 0 8px var(--food-glow); }
    50%      { box-shadow: 0 0 0 8px transparent, 0 0 16px var(--food-glow); }
  }

  /* ── NATURAL THEME — hide abstract elements ── */
  .theme-natural .food-ring,
  .theme-natural .food-label,
  .theme-natural .food-bar-wrap { display: none !important; }

  /* nest */
  /* nest */
  .nest {
    position:absolute;
    transform:translate(-50%,-50%);
  }

  .nest .ring {
    width:44px; height:44px;
    border-radius:50%;
    border: 2px solid var(--colony-color, var(--nest-red));
    background: var(--colony-glow, var(--nest-glow));
    display:flex; align-items:center; justify-content:center;
    font-size:0.6rem;
    color: var(--colony-color, var(--nest-red));
    font-weight:500;
    letter-spacing:0.04em;
    animation: pulse-nest 2s ease-in-out infinite;
  }

  @keyframes pulse-nest {
    0%,100% { box-shadow: 0 0 0 0 var(--colony-glow, var(--nest-glow)); }
    50%      { box-shadow: 0 0 0 6px transparent; }
  }

  .nest .label {
    position:absolute;
    top: calc(100% + 4px);
    left:50%; transform:translateX(-50%);
    font-size:0.55rem;
    color: var(--colony-color, var(--nest-red));
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  /* ant SVG sprite */
  .ant {
    position:absolute;
    width:16px; height:20px;
    transform-origin: center center;
    will-change: transform;
    pointer-events:none;
  }
  /* currentColor flows from the .ant div into the SVG */
  .ant { color: var(--ink); }
  .ant svg { color: inherit; }
  .ant.colony-0 { color: var(--colony-0); }
  .ant.colony-1 { color: var(--colony-1); }

  .ant svg { width:100%; height:100%; }
  .ant .frame-b { display:none; }
  .ant.step-b .frame-a { display:none; }
  .ant.step-b .frame-b { display:block; }

  /* carrying food indicator */
  .ant.carrying::after {
    content:'';
    position:absolute;
    top:-3px; left:50%;
    transform:translateX(-50%);
    width:5px; height:5px;
    border-radius:50%;
    background: var(--food-green);
    box-shadow: 0 0 4px var(--food-green);
  }

  /* controls bar */
  footer {
    position:relative;
    z-index:10;
    padding: 8px 20px;
    border-top: 1px solid var(--ink-faint);
    background: rgba(245,240,232,0.92);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    gap:24px;
    flex-wrap:wrap;
  }

  .ctrl {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.6rem;
    color: var(--ink-light);
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  .ctrl label { white-space:nowrap; }

  input[type=range] {
    -webkit-appearance:none;
    width:80px; height:2px;
    background: var(--ink-faint);
    border-radius:1px;
    outline:none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:10px; height:10px;
    border-radius:50%;
    background: var(--amber);
    cursor:pointer;
  }

  input[type=range]::-moz-range-thumb {
    width:10px; height:10px;
    border-radius:50%;
    background: var(--amber);
    cursor:pointer;
    border:none;
  }

  .val { color: var(--ink); font-weight:500; min-width:28px; }

  .btn {
    padding:4px 14px;
    border: 1px solid var(--ink);
    background:transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size:0.62rem;
    color: var(--ink);
    cursor:pointer;
    letter-spacing:0.05em;
    text-transform:uppercase;
    transition: background 0.15s, color 0.15s;
  }

  .btn:hover { background: var(--ink); color: var(--paper); }

  .legend {
    display:flex; gap:14px; align-items:center;
    margin-left:auto;
    font-size:0.58rem;
    color: var(--ink-light);
  }

  .legend-item { display:flex; gap:5px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .dot-nest { background: var(--nest-red); }
  .dot-food { background: var(--food-green); }
  .dot-pher { background: var(--amber); opacity:0.7; }
</style>
</head>
<body>

<header>
  <h1>Colonia de <em>Formica</em></h1>
  <span class="subtitle">Algoritmo ACO — Inteligencia de Enjambre &nbsp;·&nbsp; v0.2.7</span>
  <div class="spacer"></div>
  <div class="stats">
    <span>hormigas <b id="stat-ants">0</b></span>
    <span style="color:var(--colony-0)">● <b id="stat-food-0">0</b></span>
    <span style="color:var(--colony-1)">● <b id="stat-food-1">0</b></span>
    <span>tick <b id="stat-tick">0</b></span>
  </div>
</header>

<div id="arena">
  <canvas id="pheromone-canvas"></canvas>
  <canvas id="trail-canvas"></canvas>
  <div id="ant-layer"></div>
  <!-- nest and food sources injected by JS -->
</div>

<footer>
  <div class="ctrl">
    <label>Hormigas</label>
    <input type="range" id="sl-ants" min="5" max="500" step="5" value="25">
    <span class="val" id="vl-ants">25</span>
  </div>
  <div class="ctrl">
    <label>Evaporación</label>
    <input type="range" id="sl-evap" min="1" max="20" value="6">
    <span class="val" id="vl-evap">0.06</span>
  </div>
  <div class="ctrl">
    <label>Peso feromona</label>
    <input type="range" id="sl-alpha" min="1" max="10" value="4">
    <span class="val" id="vl-alpha">4</span>
  </div>
  <div class="ctrl">
    <label>Fuentes</label>
    <input type="range" id="sl-food" min="1" max="8" value="2">
    <span class="val" id="vl-food">2</span>
  </div>
  <div class="ctrl">
    <label>Comida/fuente</label>
    <input type="range" id="sl-famount" min="50" max="500" step="50" value="150">
    <span class="val" id="vl-famount">150</span>
  </div>
  <div class="ctrl">
    <label>Velocidad</label>
    <input type="range" id="sl-speed" min="0" max="6" step="1" value="3">
    <span class="val" id="vl-speed">1×</span>
  </div>
  <button class="btn" id="btn-theme">◑ Vista abstracta</button>
  <button class="btn" id="btn-restart">↺ Reiniciar</button>
  <button class="btn" id="btn-pause">⏸ Pausar</button>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--colony-0)"></div> colonia roja</div>
    <div class="legend-item"><div class="dot" style="background:var(--colony-1);border:1px solid #888"></div> colonia negra</div>
    <div class="legend-item"><div class="dot dot-food"></div> comida</div>
    <div class="legend-item"><div class="dot dot-pher"></div> feromonas</div>
  </div>
</footer>

  { id:'insect-9', value:5, aspect:1.017, vb:'99.37925 129.65727 1.65659 1.62862', cx:-0.00722, cy:-0.10947, tail:{dx:0.26361, dy:0.31428} },  // #9
];

// Precompute native heading angle of each sprite (direction the head faces).
// tail vector = center→tail, so head direction = atan2(-tail.dy, -tail.dx)
INSECT_TYPES.forEach(ins => {
  const t = ins.tail || { dx: 0, dy: -0.5 };
  ins.nativeAngle = Math.atan2(-t.dy, -t.dx);
});

let speedIdx = 3;  // arranca en 1×
// Acumulador para velocidades fraccionarias
let speedAccum = 0;
// Timestamp del último frame renderizado (para throttle lento)
let lastFrameTime = 0;

// ---- resize ----
function resize() {
  W = arena.clientWidth;
  H = arena.clientHeight;
  phCanvas.width  = trCanvas.width  = W;
  phCanvas.height = trCanvas.height = H;
  GRID_W = Math.ceil(W / CELL);
  GRID_H = Math.ceil(H / CELL);
  pheroGrids = COLONIES.map(() => {
    const g = [];
    for (let y = 0; y < GRID_H; y++) g[y] = new Float32Array(GRID_W);
    return g;
  });
}

// ---- init pheromone grids ----
function initGrid() {
  pheroGrids = COLONIES.map(() => {
    const g = [];
    for (let y = 0; y < GRID_H; y++) g[y] = new Float32Array(GRID_W);
    return g;
  });
}

function getPhero(col, gx, gy) {
  if (gx < 0 || gy < 0 || gx >= GRID_W || gy >= GRID_H) return 0;
  return pheroGrids[col][gy][gx];
}

function addPhero(col, gx, gy, amt) {
  if (gx < 0 || gy < 0 || gx >= GRID_W || gy >= GRID_H) return;
  pheroGrids[col][gy][gx] = Math.min(255, pheroGrids[col][gy][gx] + amt);
}

// ---- place nest + food ----
// Genera posiciones aleatorias con separación mínima entre todos los puntos.
function randomPos(margin) {
  return {
    x: margin + Math.random() * (W - margin * 2),
    y: margin + Math.random() * (H - margin * 2),
  };
}

function placeSources() {
  // MIN_DIST se reduce con más fuentes: con 1-2 hay mucho espacio,
  // con 8 se permite que caigan cerca — eso produce dinámicas interesantes.
  const MIN_DIST = Math.min(W, H) * Math.max(0.06, 0.22 - PARAMS.numFood * 0.02);
  const MARGIN   = 80;   // suficiente para que un bicho de 56px no se corte
  const MAX_TRIES = 200;

  // Coloca un punto aleatorio que esté al menos MIN_DIST de todos los previos
  function placeAway(existing) {
    for (let t = 0; t < MAX_TRIES; t++) {
      const p = randomPos(MARGIN);
      if (existing.every(e => Math.hypot(p.x - e.x, p.y - e.y) >= MIN_DIST)) return p;
    }
    // fallback: posición aleatoria sin restricción
    return randomPos(MARGIN);
  }

  const allPoints = [];

  // Hormigueros — one per colony
  nests = [];
  for (let c = 0; c < COLONIES.length; c++) {
    const np = placeAway(allPoints);
    nests.push({ x: Math.round(np.x), y: Math.round(np.y), colony: c });
    allPoints.push(nests[c]);
  }

  // Fuentes de comida
  foodSources = [];
  for (let i = 0; i < PARAMS.numFood; i++) {
    const fp = placeAway(allPoints);
    const iType = Math.floor(Math.random()*INSECT_TYPES.length);
    const baseAmt = Math.round(PARAMS.foodAmount * INSECT_TYPES[iType].value / 5);
    // hitRadius se calcula en renderSources cuando se conoce el tamaño visual;
    // ponemos 20 como fallback hasta que renderSources lo sobreescriba.
    foodSources.push({
      x: Math.round(fp.x), y: Math.round(fp.y),
      amount: baseAmt, maxAmount: baseAmt,
      id: i, insectType: iType, hitRadius: 20,
      // wander state
      vx: (Math.random()-0.5)*0.4,
      vy: (Math.random()-0.5)*0.4,
      wanderAngle: Math.random() * Math.PI * 2,
      dead: false,
    });
    allPoints.push(fp);
  }
}

// ---- render nest + food in DOM ----
function renderSources() {
  document.querySelectorAll('.nest,.food-source,.debug-dot').forEach(e=>e.remove());

  // Apply theme class to arena
  arena.className = arena.className.replace(/theme-\S+/g, '').trim();
  arena.classList.add('theme-' + visualTheme);

  // nests — one per colony
  nests.forEach(n => {
    const col = COLONIES[n.colony];
    const nd = document.createElement('div');
    nd.className = 'nest';
    nd.style.left = n.x + 'px';
    nd.style.top  = n.y + 'px';
    nd.style.setProperty('--colony-color', col.color);
    nd.style.setProperty('--colony-glow',  col.glow);
    nd.innerHTML = `<div class="ring">H</div><div class="label">${col.name}</div>`;
    arena.appendChild(nd);
  });

  // food sources — emit markup for BOTH themes; CSS shows/hides per theme
  foodSources.forEach(f => {
    const fd = document.createElement('div');
    fd.className = 'food-source';
    fd.id = 'food-' + f.id;
    fd.style.left = f.x + 'px';
    fd.style.top  = f.y + 'px';

    const ins = INSECT_TYPES[f.insectType];
    const BASE = 32;
    const pw = Math.round(BASE * (ins.aspect >= 1 ? 1 : ins.aspect));
    const ph = Math.round(BASE * (ins.aspect >= 1 ? 1/ins.aspect : 1));
    const barColor = stockBarColor(1.0);

    // ins.cx/cy = head (nariz), ins.tail = cola (ambos normalizados al viewBox)
    // Centro de colisión = punto medio entre cabeza y cola
    const tail = ins.tail || {dx: -ins.cx, dy: -ins.cy}; // fallback: simétrico
    const center_cx = (ins.cx + tail.dx) / 2;
    const center_cy = (ins.cy + tail.dy) / 2;
    const cx_px = Math.round(center_cx * pw);
    const cy_px = Math.round(center_cy * ph);
    // sprite top-left so that midpoint lands at (0,0):
    const sLeft = -Math.round(pw/2) - cx_px;
    const sTop  = -Math.round(ph/2) - cy_px;

    f.hitRadius = Math.max(14, Math.round((pw + ph) / 4));

    // Natural markup + Abstract markup coexist; theme CSS reveals the right one
    fd.innerHTML = `
      <div class="food-tooltip" style="top:${sTop - 18}px;left:50%;transform:translateX(-50%)">&#215;${f.amount} / ${f.maxAmount}</div>
      <div class="insect-sprite" style="position:absolute;left:${sLeft}px;top:${sTop}px;width:${pw}px;height:${ph}px;opacity:${Math.max(0.2, f.amount/f.maxAmount)}">
        <svg width="${pw}" height="${ph}" viewBox="${ins.vb}" style="display:block">
          <path d="${INSECT_PATHS[f.insectType]}" fill="#1a1410"/>
        </svg>
      </div>
      <div class="food-bar-wrap" style="width:${pw}px;top:${-Math.round(ph/2) - cy_px + ph + 4}px;left:${sLeft}px">
        <div class="food-bar" style="width:100%;background:${barColor}"></div>
      </div>
      <div class="food-ring" style="left:${cx_px}px;top:${cy_px}px">
        <span style="font-size:0.75rem;font-weight:500;color:var(--food-green)">${f.amount}</span>
      </div>
      <div class="food-label" style="left:${cx_px}px;top:${cy_px + 22}px">Comida ${f.id+1}</div>`;
    arena.appendChild(fd);

    // Debug dot: tiny red circle at exact collision point (f.x, f.y)
    const dot = document.createElement('div');
    dot.className = 'debug-dot';
    dot.id = 'dbg-' + f.id;
    dot.style.cssText = `position:absolute;left:${f.x}px;top:${f.y}px;
      width:6px;height:6px;border-radius:50%;background:red;
      transform:translate(-50%,-50%);pointer-events:none;z-index:999;
      display:${debugMode ? 'block' : 'none'}`;
    arena.appendChild(dot);
  });
}

// Interpola verde→amarillo→rojo según ratio restante
function stockBarColor(ratio) {
  const r = ratio < 0.5 ? 255 : Math.round(255 * (1 - ratio) * 2);
  const g = ratio > 0.5 ? 100 : Math.round(ratio * 2 * 100);
  return `rgb(${r},${g},30)`;
}

function updateFoodDOM(f) {
  const el = document.getElementById('food-' + f.id);
  if (!el) return;

  const ratio = f.maxAmount > 0 ? f.amount / f.maxAmount : 0;

  // tooltip
  const tip = el.querySelector('.food-tooltip');
  if (tip) tip.textContent = `×${f.amount} / ${f.maxAmount}`;

  // sprite: opacidad + wobble según ratio
  const sprite = el.querySelector('.insect-sprite');
  if (sprite) {
    sprite.style.opacity = f.amount <= 0 ? '0.08' : Math.max(0.15, ratio).toFixed(2);
    // Wobble: activo si ratio > 0.5, velocidad proporcional a vitalidad
    if (f.amount <= 0 || ratio <= 0.5) {
      sprite.style.animationPlayState = 'paused';
      sprite.style.animationDuration  = '3s';
    } else {
      // más lleno = más rápido y enérgico (3s → 1s)
      const dur = (3 - (ratio - 0.5) * 2 * 2).toFixed(2);  // 3s at 50%, 1s at 100%
      sprite.style.animationPlayState = 'running';
      sprite.style.animationDuration  = dur + 's';
    }
  }

  // barra de stock
  const bar = el.querySelector('.food-bar');
  if (bar) {
    bar.style.width   = (ratio * 100).toFixed(1) + '%';
    bar.style.background = stockBarColor(ratio);
  }

  if (f.amount <= 0 && !f.dead) {
    f.dead = true;
    el.classList.add('depleted');
  }
}

// ============================================================
//  ANT
// ============================================================
const DIRS = [];
for (let a = 0; a < 8; a++) {
  const angle = (a / 8) * Math.PI * 2;
  DIRS.push({ dx: Math.cos(angle), dy: Math.sin(angle) });
}

function createAnt(colony) {
  const col = COLONIES[colony];
  const el = document.createElement('div');
  el.className = 'ant colony-' + colony;
  el.innerHTML = `
    <svg class="frame-a"><use href="#ant-a"/></svg>
    <svg class="frame-b"><use href="#ant-b"/></svg>
  `;
  antLayer.appendChild(el);

  const nest = nests[colony];
  return {
    x: nest.x + (Math.random()-0.5)*10,
    y: nest.y + (Math.random()-0.5)*10,
    angle: Math.random() * Math.PI * 2,
    state: 'searching',
    carrying: false,
    foodTarget: null,
    colony,
    path: [],
    el,
    stepPhase: 0,
    stepTimer: 0,
  };
}

function gridOf(wx, wy) {
  return {
    gx: Math.floor(wx / CELL),
    gy: Math.floor(wy / CELL),
  };
}

function dist(ax,ay,bx,by) {
  const dx=ax-bx, dy=ay-by;
  return Math.sqrt(dx*dx+dy*dy);
}

// Angle towards target
function angleTo(ax,ay,bx,by) {
  return Math.atan2(by-ay, bx-ax);
}

function wrapAngle(a) {
  while (a >  Math.PI) a -= Math.PI*2;
  while (a < -Math.PI) a += Math.PI*2;
  return a;
}

function stepAnt(ant, dt) {
  const speed = 1.4; // px per tick
  const turnRate = 0.22; // radians per tick max random turn

  if (ant.state === 'searching') {
    // --- pheromone-biased random walk ---
    // Sample 5 candidate angles
    const candidates = [];
    for (let i = 0; i < 7; i++) {
      const a = ant.angle + (Math.random()-0.5) * Math.PI * 0.9;
      const nx = ant.x + Math.cos(a) * CELL;
      const ny = ant.y + Math.sin(a) * CELL;
      const {gx, gy} = gridOf(nx, ny);
      let ph = getPhero(ant.colony, gx, gy);
      // slight forward bias
      const fwd = Math.cos(a - ant.angle);
      const score = Math.pow(ph + 1, PARAMS.alpha) * Math.pow(Math.max(fwd,0)+0.5, PARAMS.beta);
      candidates.push({ a, score, nx, ny });
    }
    // weighted random selection
    const total = candidates.reduce((s,c)=>s+c.score,0);
    let r = Math.random() * total;
    let chosen = candidates[0];
    for (const c of candidates) {
      r -= c.score;
      if (r <= 0) { chosen = c; break; }
    }

    ant.angle = chosen.a + (Math.random()-0.5)*0.1;
    ant.x += Math.cos(ant.angle) * speed;
    ant.y += Math.sin(ant.angle) * speed;

    // bounce off walls
    if (ant.x < 10) { ant.x = 10; ant.angle = Math.PI - ant.angle; }
    if (ant.x > W-10) { ant.x = W-10; ant.angle = Math.PI - ant.angle; }
    if (ant.y < 10) { ant.y = 10; ant.angle = -ant.angle; }
    if (ant.y > H-10) { ant.y = H-10; ant.angle = -ant.angle; }

    // record path
    const {gx, gy} = gridOf(ant.x, ant.y);
    const last = ant.path[ant.path.length-1];
    if (!last || last.gx !== gx || last.gy !== gy) {
      ant.path.push({x: ant.x, y: ant.y, gx, gy});
      if (ant.path.length > 600) ant.path.shift();
    }

    // check food
    for (const f of foodSources) {
      if (f.amount > 0 && dist(ant.x, ant.y, f.x, f.y) < (f.hitRadius || 20)) {
        f.amount = Math.max(0, f.amount - 1);
        foodCollected++;
        foodPerColony[ant.colony]++;
        updateFoodDOM(f);
        ant.state = 'returning';
        ant.carrying = true;
        ant.el.classList.add('carrying');
        ant.foodTarget = f;
        // reverse path for deposit
        ant.returnPath = [...ant.path].reverse();
        ant.returnIdx = 0;
        break;
      }
    }

  } else {
    // --- returning to nest, deposit pheromones ---
    // steer toward own nest
    const nest = nests[ant.colony];
    const targetAngle = angleTo(ant.x, ant.y, nest.x, nest.y);
    let diff = wrapAngle(targetAngle - ant.angle);
    ant.angle += diff * 0.18 + (Math.random()-0.5) * 0.15;

    ant.x += Math.cos(ant.angle) * speed * 1.1;
    ant.y += Math.sin(ant.angle) * speed * 1.1;

    // deposit pheromones along current position
    const {gx, gy} = gridOf(ant.x, ant.y);
    addPhero(ant.colony, gx, gy, PARAMS.depositAmount * 0.4);
    // also deposit along remembered path proportionally
    if (ant.returnIdx < ant.returnPath.length) {
      const rp = ant.returnPath[ant.returnIdx];
      addPhero(ant.colony, rp.gx, rp.gy, PARAMS.depositAmount);
      ant.returnIdx++;
    }

    // arrived at nest?
    if (dist(ant.x, ant.y, nest.x, nest.y) < 22) {
      ant.state = 'searching';
      ant.carrying = false;
      ant.el.classList.remove('carrying');
      ant.path = [];
      ant.returnPath = [];
      ant.returnIdx = 0;
      ant.angle = Math.random() * Math.PI * 2;
    }
  }

  // animate sprite step
  ant.stepTimer++;
  if (ant.stepTimer >= 6) {
    ant.stepTimer = 0;
    ant.stepPhase = 1 - ant.stepPhase;
    if (ant.stepPhase) ant.el.classList.add('step-b');
    else               ant.el.classList.remove('step-b');
  }
}

function renderAnt(ant) {
  const deg = (ant.angle * 180 / Math.PI) + 90; // +90 because sprite points north
  ant.el.style.transform = `translate(${ant.x - 8}px, ${ant.y - 10}px) rotate(${deg}deg)`;
}

// ============================================================
//  PHEROMONE RENDERING
// ============================================================
function evaporate() {
  for (let c = 0; c < COLONIES.length; c++) {
    const g = pheroGrids[c];
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        g[y][x] *= (1 - PARAMS.evapRate);
        if (g[y][x] < 0.2) g[y][x] = 0;
      }
    }
  }
}

function drawPheromones() {
  phCtx.clearRect(0, 0, W, H);
  trCtx.clearRect(0, 0, W, H);

  for (let c = 0; c < COLONIES.length; c++) {
    const g   = pheroGrids[c];
    const rgb = COLONIES[c].pheroRGB;

    // layer 1: heatmap
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        const v = g[y][x];
        if (v < 0.3) continue;
        const alpha = Math.min(v / 255, 1) * 0.30;
        phCtx.fillStyle = `rgba(${rgb},${alpha.toFixed(3)})`;
        phCtx.fillRect(x*CELL, y*CELL, CELL, CELL);
      }
    }

    // layer 2: trail dots
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        const v = g[y][x];
        if (v < 2) continue;
        const norm  = Math.min(v / 120, 1);
        const lw    = norm * 2.5;
        const alpha = norm * 0.60;
        trCtx.strokeStyle = `rgba(${rgb},${alpha.toFixed(3)})`;
        trCtx.lineWidth = lw;
        trCtx.beginPath();
        trCtx.arc(x*CELL + CELL/2, y*CELL + CELL/2, lw*0.8, 0, Math.PI*2);
        trCtx.stroke();
      }
    }
  }
}

// ============================================================
//  INSECT MOVEMENT
// ============================================================
const INSECT_SPEED    = 0.18;   // px/tick at 100% health
const INSECT_MARGIN   = 60;     // bounce margin from walls
const INSECT_STOP_AT  = 0.50;   // ratio below which insect stops moving

function stepInsects() {
  for (const f of foodSources) {
    if (f.dead || f.amount <= 0) continue;

    const ratio = f.amount / f.maxAmount;
    if (ratio <= INSECT_STOP_AT) continue;   // too weak to move

    // Velocity scale: 0 at INSECT_STOP_AT, 1 at 100%
    const vitality = (ratio - INSECT_STOP_AT) / (1 - INSECT_STOP_AT);
    const spd = INSECT_SPEED * vitality;

    // Slowly drift the wander angle (smooth random walk)
    f.wanderAngle += (Math.random() - 0.5) * 0.18;

    // Blend current velocity toward wander direction
    const wx = Math.cos(f.wanderAngle) * spd;
    const wy = Math.sin(f.wanderAngle) * spd;
    f.vx = f.vx * 0.88 + wx * 0.12;
    f.vy = f.vy * 0.88 + wy * 0.12;

    // Move
    f.x += f.vx;
    f.y += f.vy;

    // Bounce off walls
    if (f.x < INSECT_MARGIN)  { f.x = INSECT_MARGIN;  f.vx =  Math.abs(f.vx); f.wanderAngle = 0; }
    if (f.x > W - INSECT_MARGIN) { f.x = W - INSECT_MARGIN; f.vx = -Math.abs(f.vx); f.wanderAngle = Math.PI; }
    if (f.y < INSECT_MARGIN)  { f.y = INSECT_MARGIN;  f.vy =  Math.abs(f.vy); f.wanderAngle = Math.PI/2; }
    if (f.y > H - INSECT_MARGIN) { f.y = H - INSECT_MARGIN; f.vy = -Math.abs(f.vy); f.wanderAngle = -Math.PI/2; }

    // Update DOM position + rotate to align head axis with movement direction
    const el = document.getElementById('food-' + f.id);
    if (el) {
      const ins    = INSECT_TYPES[f.insectType];
      const movAng = Math.atan2(f.vy, f.vx);
      const rotDeg = (movAng - ins.nativeAngle) * 180 / Math.PI;
      el.style.left      = f.x + 'px';
      el.style.top       = f.y + 'px';
      el.style.transform = `rotate(${rotDeg.toFixed(1)}deg)`;
    }
    const dot = document.getElementById('dbg-' + f.id);
    if (dot) {
      dot.style.left = f.x + 'px';
      dot.style.top  = f.y + 'px';
    }
  }
}

// ============================================================
//  MAIN LOOP  — generation-counter pattern
//  Cada llamada a init() incrementa `generation`. El loop
//  comprueba su propia generación al inicio: si ya no es la
//  actual, se autodetiene sin necesidad de cancelAnimationFrame.
// ============================================================
let generation = 0;

function loop(myGen, ts) {
  if (myGen !== generation) return;

  if (!paused) {
    const speed = SPEED_STEPS[speedIdx];

    if (speed >= 1) {
      // Velocidad normal o rápida: ejecutar N ticks de física por frame
      const steps = Math.round(speed);
      for (let s = 0; s < steps; s++) {
        tick++;
        for (const ant of ants) stepAnt(ant);
        if (tick % 3 === 0) stepInsects();
        if (tick % 2 === 0) evaporate();
      }
      // Un solo render por frame independientemente de steps
      drawPheromones();
      for (const ant of ants) renderAnt(ant);

    } else {
      // Velocidad lenta: solo actualizar cada N ms (throttle)
      // speed=0.5 → cada ~33ms (30fps), speed=0.25 → ~67ms, speed=0.1 → ~167ms
      const interval = (1000 / 60) / speed;
      if (ts - lastFrameTime >= interval) {
        lastFrameTime = ts;
        tick++;
        for (const ant of ants) stepAnt(ant);
        if (tick % 3 === 0) stepInsects();
        if (tick % 2 === 0) evaporate();
        drawPheromones();
        for (const ant of ants) renderAnt(ant);
      }
    }

    if (tick % 10 === 0) {
      document.getElementById('stat-ants').textContent = ants.length;
      document.getElementById('stat-food-0').textContent = foodPerColony[0];
      document.getElementById('stat-food-1').textContent = foodPerColony[1];
      document.getElementById('stat-tick').textContent = tick;
    }
  }

  requestAnimationFrame(t => loop(myGen, t));
}

// ============================================================
//  INIT
// ============================================================
function init() {
  // Invalidar cualquier loop previo incrementando la generación
  generation++;
  const myGen = generation;

  antLayer.innerHTML = '';
  ants = [];
  tick = 0;
  foodCollected = 0;
  foodPerColony = COLONIES.map(() => 0);
  paused = false;
  document.getElementById('btn-pause').textContent = '⏸ Pausar';

  resize();
  initGrid();
  placeSources();
  renderSources();

  // Spawn ants 50/50 across colonies
  const perColony = Math.max(1, Math.floor(PARAMS.numAnts / COLONIES.length));
  for (let c = 0; c < COLONIES.length; c++) {
    for (let i = 0; i < perColony; i++) {
      ants.push(createAnt(c));
    }
  }

  lastFrameTime = 0;
  speedAccum = 0;
  // Arrancar el loop de esta generación
  requestAnimationFrame(t => loop(myGen, t));
}

function bindSlider(id, valId, key, transform) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.value = transform ? transform(PARAMS[key]) : PARAMS[key];
  sl.addEventListener('input', () => {
    const raw = parseFloat(sl.value);
    PARAMS[key] = transform ? transform(raw, true) : raw;
    vl.textContent = transform ? transform(raw) : raw;
  });
}

// evap: slider 1-20 → actual 0.01-0.20
document.getElementById('sl-evap').addEventListener('input', function() {
  PARAMS.evapRate = parseFloat(this.value) / 100;
  document.getElementById('vl-evap').textContent = PARAMS.evapRate.toFixed(2);
});

document.getElementById('sl-ants').addEventListener('input', function() {
  const target = parseInt(this.value);
  PARAMS.numAnts = target;  // persistir para que Reiniciar lo respete
  document.getElementById('vl-ants').textContent = target;
  while (ants.length < target) {
    // add to colony with fewest ants
    const counts = COLONIES.map((_, c) => ants.filter(a => a.colony === c).length);
    const minCol = counts.indexOf(Math.min(...counts));
    ants.push(createAnt(minCol));
  }
  while (ants.length > target) {
    const a = ants.pop();
    a.el.remove();
  }
});

document.getElementById('sl-alpha').addEventListener('input', function() {
  PARAMS.alpha = parseInt(this.value);
  document.getElementById('vl-alpha').textContent = PARAMS.alpha;
});

document.getElementById('sl-food').addEventListener('input', function() {
  PARAMS.numFood = parseInt(this.value);
  document.getElementById('vl-food').textContent = PARAMS.numFood;
});

document.getElementById('sl-famount').addEventListener('input', function() {
  PARAMS.foodAmount = parseInt(this.value);
  document.getElementById('vl-famount').textContent = PARAMS.foodAmount;
});

// Speed slider
const SPEED_LABELS = ['0.1×','0.25×','0.5×','1×','2×','4×','8×'];
document.getElementById('sl-speed').addEventListener('input', function() {
  speedIdx = parseInt(this.value);
  document.getElementById('vl-speed').textContent = SPEED_LABELS[speedIdx];
});

document.getElementById('btn-theme').addEventListener('click', function() {
  visualTheme = visualTheme === 'natural' ? 'abstract' : 'natural';
  this.textContent = visualTheme === 'natural' ? '◑ Vista abstracta' : '◑ Vista natural';
  // Update arena class + re-render sources in place (no physics reset)
  arena.className = arena.className.replace(/theme-\S+/g, '').trim();
  arena.classList.add('theme-' + visualTheme);
});

// D key: toggle debug dots at exact collision points
document.addEventListener('keydown', e => {
  if (e.key !== 'd' && e.key !== 'D') return;
  debugMode = !debugMode;
  document.querySelectorAll('.debug-dot').forEach(el => {
    el.style.display = debugMode ? 'block' : 'none';
  });
});

document.getElementById('btn-restart').addEventListener('click', init);

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '▶ Reanudar' : '⏸ Pausar';
});

// Resize debounced — solo reajusta canvas+DOM, no relanza init
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resize();
    renderSources();
    drawPheromones();
  }, 120);
});

// kick off
window.addEventListener('load', init);
</script>
</body>
</html>
